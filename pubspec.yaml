name: gesetzimnetz_app
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  connectivity_plus: ^6.1.5
  flutter_svg: ^2.2.1
  http: ^1.5.0
  path: ^1.9.1
  sqflite: ^2.4.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.6

flutter:
  uses-material-design: true
  assets:
    - favicon.svg
    - icon-192.png

flutter_launcher_icons:
  android: true
  ios: true
  image_path: icon-192.png
  min_sdk_android: 21
  remove_alpha_ios: true
  web:
    generate: true
    image_path: icon-192.png
    background_color: "#F6F7F9"
    theme_color: "#0B5D7A"
  windows:
    generate: true
    image_path: icon-192.png
  macos:
    generate: true
    image_path: icon-192.png

flutter_native_splash:
  color: "#F6F7F9"
  image: icon-192.png
  android_12:
    color: "#F6F7F9"
    image: icon-192.png
  web: true
